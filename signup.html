<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Pinpointa</title>
  <link rel="stylesheet" href="css/signup.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>
<body>

<div class="signup-container">

  <!-- LEFT SIDE -->
  <div class="signup-info">
    <h1>Pinpointa</h1>
    <p>
      Create an account to discover nearby places, explore trusted locations,
      and contribute to a growing community of accurate local information.
    </p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="signup-card">
    <h2>Create Account</h2>

    <form>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="John Doe" required>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="example@email.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <button type="button" onclick="goToLogin()">Create Account</button>

      <p class="login-link">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>
    </form>
  </div>

</div>

<script>
  function goToLogin() {
    window.location.href = "login.html";
  }
</script>
</body>
</html>
