<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Results | Pinpointa</title>
  <link rel="stylesheet" href="css/results.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>
<body>

<header class="top-bar">
  <h1>Pinpointa</h1>
  <div class="profile">👤</div>
</header>

<section class="filters">
  <select>
    <option>All Categories</option>
    <option>School</option>
    <option>Hospital</option>
    <option>Restaurant</option>
  </select>

  <select>
    <option>Rating</option>
    <option>4★ & up</option>
    <option>3★ & up</option>
  </select>

  <select>
    <option>Price</option>
    <option>Low</option>
    <option>Medium</option>
    <option>High</option>
  </select>

  <label class="checkbox">
    <input type="checkbox"> Open now
  </label>
</section>

<main class="results">

  <div class="result-card" onclick="location.href='details.html'">
    <img src="img/place1.jpg" alt="">
    <div class="info">
      <h3>Kenyatta National Hospital</h3>

      <div class="badges">
        <span class="badge blue">Hospital</span>
        <span class="badge green">Open</span>
      </div>

      <p class="location">📍 Nairobi</p>
      <p class="rating">⭐ 4.6 (1,240 reviews)</p>

      <span class="view">View details →</span>
    </div>
  </div>

  <div class="result-card">
    <img src="img/place2.jpg" alt="">
    <div class="info">
      <h3>Westlands Mall</h3>

      <div class="badges">
        <span class="badge blue">Shopping</span>
        <span class="badge red">Closed</span>
      </div>

      <p class="location">📍 Westlands</p>
      <p class="rating">⭐ 4.3 (980 reviews)</p>

      <span class="view">View details →</span>
    </div>
  </div>

</main>

</body>
</html>
