<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Pinpointa</title>
  <link rel="stylesheet" href="css\login.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="login-container">

  <!-- LEFT INFO -->
  <div class="login-info">
    <h1>Pinpointa</h1>
    <p>
      Welcome back. Log in to continue discovering trusted places,
      navigating nearby locations, and sharing valuable location data.
    </p>
  </div>

  <!-- LOGIN CARD -->
  <div class="login-card">
    <h2>Sign In</h2>

    <form>
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" placeholder="example@email.com" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="options">
        <label>
          <input type="checkbox"> Remember me
        </label>
        
      </div>

      <button type="button" onclick="goToSearch()">Login</button>

      <p class="signup-link">
        Don’t have an account?
        <a href="signup.html">Create one</a>
      </p>
    </form>
  </div>

</div>
<script>
  function goToSearch() {
    window.location.href = "search.html";
  }
</script>

</body>
</html>
